services:
  manager:
    build: ./manager
    ports:
      - "8000:8000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=eu-north-1
    depends_on:
      - worker

  worker:
    build: ./worker
    # FIX 1: Map the port so the manager can reach it at http://worker:8080
    ports:
      - "8080:8080"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=eu-north-1
      - DEST_BUCKET=your-bucket-name
    # FIX 2: This triggers the RIE (Runtime Interface Emulator) 
    # Replace 'processor' with your filename and 'lambda_handler' with your function name
    command: ["processor.lambda_handler"]